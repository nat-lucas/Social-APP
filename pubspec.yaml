name: social_app
description: A social media app with Firebase and BLoC architecture.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  get: ^4.6.6
  equatable: ^2.0.5
  bloc: ^8.1.4

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.8
  firebase_storage: ^12.4.6

  # Navigation
  go_router: ^14.8.1

  # UI
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  timeago: ^3.7.0
  shimmer: ^3.0.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.5

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
